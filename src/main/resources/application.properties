spring.application.name=Smart University Devices and Materials Maintenance System

# ─── Database Configuration ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_university_maintenance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/

# ─── Thymeleaf ───────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ─── Mail (SMTP) ─────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harindintwarietiennee@gmail.com
# Gmail App Password — spaces removed (required format for JavaMail)
spring.mail.password=xhqh doio wffs ebgj
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.default-encoding=UTF-8
# Enable debug logging for email
spring.mail.properties.mail.debug=true

# ─── JWT Configuration ───────────────────────────────────────────────────────
app.jwt.secret=SmartUniversityMaintenanceSystem2024SecretKeyForJWTSigningPurposesOnly
app.jwt.expiration=86400000

# ─── OTP Configuration ───────────────────────────────────────────────────────
app.otp.expiry-minutes=1440

# ─── Multipart (file uploads) ────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
