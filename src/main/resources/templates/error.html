<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Error – Smart University MMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="error-container">
    <div class="error-card">
        <div class="error-code" th:text="${statusCode != null ? statusCode : '404'}">404</div>
        <h1 class="error-title">Unexpected System State</h1>
        <p class="error-msg" th:text="${errorMessage != null ? errorMessage : 'The resource you are looking for might have been moved or is temporarily unavailable.'}">
            Something went wrong with your request. Our technical team has been notified.
        </p>
        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
            <a href="/" class="btn btn-indigo px-4 py-2">
                <i class="bi bi-house-door me-2"></i> Go Home
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-indigo px-4 py-2">
                <i class="bi bi-arrow-left me-2"></i> Go Back
            </a>
        </div>
        <div class="mt-5 pt-4 border-top border-secondary opacity-50">
            <small class="text-muted" style="color:#cbd5e1 !important">Smart University Maintenance System · National Platform</small>
        </div>
    </div>
</body>
</html>
