<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTP Verification – Smart University MMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link th:href="@{/css/auth.css}" rel="stylesheet" />
</head>

<body>
    <div class="auth-page auth-page-centered">
        <div class="otp-card">
            <div class="otp-icon-wrap">
                <div class="otp-icon"><i class="bi bi-shield-lock-fill"></i></div>
            </div>
            <h2>OTP Verification</h2>
            <p>Enter the 6-digit code sent to your email address</p>

            <div th:if="${error}" class="alert alert-danger alert-sm" th:text="${error}"></div>

            <form th:action="@{/otp/verify}" method="post">
                <input type="hidden" name="email" th:value="${email}" />

                <div class="otp-inputs" id="otpInputs">
                    <input type="text" class="otp-digit" maxlength="1" id="d1" autofocus />
                    <input type="text" class="otp-digit" maxlength="1" id="d2" />
                    <input type="text" class="otp-digit" maxlength="1" id="d3" />
                    <input type="text" class="otp-digit" maxlength="1" id="d4" />
                    <input type="text" class="otp-digit" maxlength="1" id="d5" />
                    <input type="text" class="otp-digit" maxlength="1" id="d6" />
                </div>
                <input type="hidden" name="otpCode" id="otpCode" />

                <div class="otp-timer" id="otpTimer">
                    Code expires in <span id="countdown">10:00</span>
                </div>

                <button type="submit" class="btn-auth-submit w-100 mt-3" onclick="collectOtp()">
                    <i class="bi bi-check-circle me-2"></i>Verify OTP
                </button>
            </form>

            <a th:href="@{/login}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
        </div>
    </div>

    <script>
        // Auto-advance OTP inputs
        const digits = document.querySelectorAll('.otp-digit');
        digits.forEach((inp, i) => {
            inp.addEventListener('input', () => {
                if (inp.value.length === 1 && i < 5) digits[i + 1].focus();
            });
            inp.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !inp.value && i > 0) digits[i - 1].focus();
            });
        });
        function collectOtp() {
            document.getElementById('otpCode').value = [...digits].map(d => d.value).join('');
        }

        // Countdown timer
        let seconds = 600;
        const cd = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            cd.textContent = `${m}:${s.toString().padStart(2, '0')}`;
            if (seconds <= 0) { clearInterval(timer); cd.textContent = 'Expired'; }
        }, 1000);
    </script>
</body>

</html>
