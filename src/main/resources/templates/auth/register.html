<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – Smart University MMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link th:href="@{/css/auth.css}" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <style>
        .select2-container .select2-selection--single {
            height: 52px !important;
            border: 1px solid rgba(226, 232, 240, 0.8) !important;
            border-radius: 12px !important;
            display: flex;
            align-items: center;
            background-color: #f8fafc;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 50px !important;
            right: 14px !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            color: #334155 !important;
            font-size: 14.5px;
            padding-left: 14px;
        }
    </style>
</head>

<body>
    <div class="auth-page">
        <div class="auth-left">
            <div class="auth-brand">
                <div class="brand-icon"><i class="bi bi-building-gear"></i></div>
                <h1 class="brand-title">Join the Smart University Maintenance Platform</h1>
                <p class="brand-sub">Rwanda's national university device and materials management system</p>
            </div>
            <div class="auth-features">
                <div class="feature-item"><i class="bi bi-person-check"></i><span>Accounts verified by Admin</span>
                </div>
                <div class="feature-item"><i class="bi bi-university"></i><span>All Rwanda institutions included</span>
                </div>
                <div class="feature-item"><i class="bi bi-phone"></i><span>OTP via Email or SMS</span></div>
            </div>
        </div>
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h2>Create Account</h2>
                    <p>Fill in your details to register</p>
                </div>

                <div th:if="${error}" class="alert alert-danger alert-sm" th:text="${error}"></div>

                <form th:action="@{/auth/register}" method="post" id="registerForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="fullName" name="fullName"
                                    placeholder="Full Name" required />
                                <label>Full Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Username" required />
                                <label>Username</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control" id="email" name="email" placeholder="Email"
                                    required />
                                <label>Email</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber"
                                    placeholder="Phone" />
                                <label>Phone Number</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" name="password"
                                    placeholder="Password" required />
                                <label>Password</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select class="form-select" id="role" name="role" required>
                                    <option value="">Select Role</option>
                                    <option value="TECHNICIAN">Technician</option>
                                    <option value="STAFF">Staff / Lab Supervisor</option>
                                    <option value="CLEANER_STUDENT">Cleaner / Student</option>
                                </select>
                                <label>Role</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label"
                                style="font-size: 12.5px; color: #64748b; font-weight: 600; margin-bottom: 6px;">University
                                / Institution</label>
                            <select class="form-select select2-searchable" id="universityId" name="universityId"
                                required onchange="loadColleges(this.value)">
                                <option value="">Select University</option>
                                <option th:each="uni : ${universities}" th:value="${uni.id}"
                                    th:text="${uni.name + ' (' + uni.abbreviation + ')'}">University</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label"
                                style="font-size: 12.5px; color: #64748b; font-weight: 600; margin-bottom: 6px;">College
                                / Department</label>
                            <select class="form-select select2-searchable" id="collegeId" name="collegeId">
                                <option value="">Select College (optional)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-auth-submit w-100 mt-4">
                        <i class="bi bi-person-plus me-2"></i>Register Account
                    </button>
                </form>

                <p class="auth-footer-link">Already have an account? <a th:href="@{/login}">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function () {
            $('.select2-searchable').select2({
                placeholder: "Search for an option",
                width: '100%'
            });
        });

        async function loadColleges(universityId) {
            const sel = document.getElementById('collegeId');
            sel.innerHTML = '<option value="">Loading...</option>';
            $('#collegeId').trigger('change'); // Update select2

            if (!universityId) {
                sel.innerHTML = '<option value="">Select College (optional)</option>';
                $('#collegeId').trigger('change');
                return;
            }

            const res = await fetch(`/auth/colleges/${universityId}`);
            const colleges = await res.json();

            sel.innerHTML = '<option value="">Select College (optional)</option>';
            colleges.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                opt.textContent = `${c.name} (${c.abbreviation})`;
                sel.appendChild(opt);
            });
            $('#collegeId').trigger('change'); // Refresh select2 with new options
        }
    </script>
</body>

</html>
