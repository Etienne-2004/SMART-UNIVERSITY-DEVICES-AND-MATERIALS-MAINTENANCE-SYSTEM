<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Maintenance Tasks')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('maintenance')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Maintenance Operations')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-tools text-indigo me-2"></i> Maintenance Tasks
            </h2>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Task Assignment Grid/Table -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">All Maintenance Requests</div>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#ID</th>
                                <th>Item</th>
                                <th>Issue</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="req : ${requests}">
                                <td th:text="${req.id}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar-sm bg-primary text-white rounded-circle me-2 d-flex align-items-center justify-content-center" 
                                             style="width: 28px; height: 28px; font-size: 10px;">
                                            <span th:text="${req.reportedBy?.fullName != null ? #strings.substring(req.reportedBy.fullName, 0, 1).toUpperCase() : 'U'}">U</span>
                                        </div>
                                        <div>
                                            <div class="fw-600" th:text="${req.reportedBy?.fullName ?: 'Unknown'}">John Doe</div>
                                            <small class="text-muted" th:text="${req.reportedBy?.email ?: 'unknown@example.com'}">john@example.com</small>
                                        </div>
                                    </div>
                                </td>
                                <td th:text="${req.device?.deviceName ?: 'N/A'}">Laptop</td>
                                <td th:text="${req.material?.materialName ?: 'N/A'}">Projector</td>
                                <td th:text="${req.issueType}">Hardware Issue</td>
                                <td th:text="${req.priority}">High</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${req.status.name() == 'PENDING' ? 'bg-warning' : 
                                                     req.status.name() == 'IN_PROGRESS' ? 'bg-info' : 
                                                     req.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-secondary'}"
                                          th:text="${#strings.replace(req.status.name(), '_', ' ')}">PENDING</span>
                                </td>
                                <td th:text="${#temporals.format(req.reportedAt,'dd MMM yyyy HH:mm')}">15 Mar 2026 14:30</td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button class="btn btn-sm btn-outline-primary" 
                                                th:onclick="'viewDetails(' + ${req.id} + ')'"
                                                data-bs-toggle="modal" data-bs-target="#taskModal">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <th:block th:if="${req.status.name() == 'PENDING'}">
                                            <button class="btn btn-sm btn-outline-success" 
                                                    th:onclick="'assignTask(' + ${req.id} + ')'"
                                                    data-bs-toggle="modal" data-bs-target="#assignModal">
                                                <i class="bi bi-person-plus"></i>
                                            </button>
                                        </th:block>
                                        <th:block th:if="${req.status.name() == 'COMPLETED'}">
                                            <button class="btn btn-sm btn-outline-warning" 
                                                    th:onclick="'verifyTask(' + ${req.id} + ')'">
                                                <i class="bi bi-check-circle"></i>
                                            </button>
                                        </th:block>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Modals for assignment -->
            <div th:each="r: ${requests}" th:if="${r.status.name() == 'PENDING'}" class="modal fade"
                th:id="'assignModal' + ${r.id}" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <form th:action="@{'/admin/maintenance/' + ${r.id} + '/assign'}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title">Assign Technician to Task #<span th:text="${r.id}"></span></h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Select Technician</label>
                                    <select name="technicianId" class="form-select" required>
                                        <option value="">-- Choose One --</option>
                                        <option th:each="t: ${technicians}" th:value="${t.id}" th:text="${t.fullName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Due Date (Optional)</label>
                                    <input type="datetime-local" name="dueDate" class="form-control" />
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-outline-secondary"
                                    data-bs-dismiss="modal">Cancel</button>
                                <button type="submit" class="btn btn-primary">Confirm Assignment</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>

</html>
