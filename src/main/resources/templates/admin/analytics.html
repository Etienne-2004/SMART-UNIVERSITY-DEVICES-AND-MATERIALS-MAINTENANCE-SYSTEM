<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('System Analytics')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('analytics')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('System Analytics')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-bar-chart-line-fill text-indigo me-2"></i> System
                Analytics</h2>

            <div class="row g-4 mb-4">
                <div class="col-xl-6">
                    <div class="panel">
                        <div class="panel-head">
                            <div class="panel-title">Technician Performance</div>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Technician</th>
                                        <th>Requests</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="perf: ${technicianPerformance}">
                                        <td th:text="${perf.key.fullName}">Technician Name</td>
                                        <td th:text="${perf.value}">0</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="col-xl-6">
                    <div class="panel">
                        <div class="panel-head">
                            <div class="panel-title">University Scope</div>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>University</th>
                                        <th>Abbreviation</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u: ${universities}">
                                        <td th:text="${u.name}">University Name</td>
                                        <td th:text="${u.abbreviation}">ABBR</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">System Health Summary</div>
                </div>
                <div class="row g-4 p-4 text-center">
                    <div class="col-md-3">
                        <div class="text-muted small mb-1">TOTAL DEVICES</div>
                        <div class="h3 fw-700 text-danger" th:text="${totalDevices}">0</div>
                    </div>
                    <div class="col-md-3">
                        <div class="text-muted small mb-1">PENDING TASKS</div>
                        <div class="h3 fw-700 text-warning" th:text="${pendingCount}">0</div>
                    </div>
                    <div class="col-md-3">
                        <div class="text-muted small mb-1">IN PROGRESS</div>
                        <div class="h3 fw-700 text-info" th:text="${inProgressCount}">0</div>
                    </div>
                    <div class="col-md-3">
                        <div class="text-muted small mb-1">COMPLETED</div>
                        <div class="h3 fw-700 text-success" th:text="${completedCount}">0</div>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>

</html>
