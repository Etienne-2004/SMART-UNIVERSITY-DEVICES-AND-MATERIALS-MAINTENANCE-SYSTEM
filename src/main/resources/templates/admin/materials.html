<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Material Management')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('materials')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Material Management')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-box-fill text-indigo me-2"></i> Material
                Management</h2>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- All Materials -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">Materials Inventory</div>
                    <div class="search-input-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control form-control-sm" placeholder="Search materials..."
                            oninput="filterMaterials(this.value)" />
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="materialsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Location</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Reported By</th>
                                <th>University</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="m: ${materials}">
                                <td th:text="${m.id}" class="text-muted small"></td>
                                <td th:text="${m.materialName}">Material Name</td>
                                <td th:text="${m.roomLocation}">Room</td>
                                <td th:text="${m.description != null and m.description.length() > 25 ? m.description.substring(0,25) + '...' : m.description ?: '—'}">Description</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${m.status.name() == 'VERIFIED' ? 'bg-success' : 'bg-warning'}"
                                        th:text="${m.status}">STATUS</span>
                                </td>
                                <td th:text="${m.reportedBy?.fullName ?: '—'}">Reported By</td>
                                <td th:text="${m.university?.abbreviation ?: '—'}">Uni</td>
                                <td th:text="${#temporals.format(m.createdAt,'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:attr="data-bs-target='#editMaterialModal' + ${m.id}" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form th:action="@{'/admin/materials/' + ${m.id} + '/delete'}" method="post" style="display:inline" onsubmit="return confirm('Are you sure you want to delete this material?');">
                                            <button class="btn btn-sm btn-outline-danger" title="Delete">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- Edit Material Modals -->
    <div th:each="m: ${materials}" class="modal fade" th:id="'editMaterialModal' + ${m.id}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{'/admin/materials/' + ${m.id} + '/edit'}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Material</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Material Name</label>
                            <input type="text" name="materialName" class="form-control" th:value="${m.materialName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Room Location</label>
                            <input type="text" name="roomLocation" class="form-control" th:value="${m.roomLocation}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" th:text="${m.description}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="PENDING" th:selected="${m.status.name() == 'PENDING'}">Pending</option>
                                <option value="VERIFIED" th:selected="${m.status.name() == 'VERIFIED'}">Verified</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

    <script>
        function filterMaterials(q) {
            q = q.toLowerCase();
            document.querySelectorAll('#materialsTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function deleteMaterial(id) {
            if (confirm('Are you sure you want to delete this material?')) {
                window.location.href = '/admin/materials/' + id + '/delete';
            }
        }
    </script>
</body>

</html>
