<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Material Management')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('materials')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Material Management')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-box-fill text-indigo me-2"></i> Material
                Management</h2>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- All Materials -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">Materials Inventory</div>
                    <div class="search-input-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control form-control-sm" placeholder="Search materials..."
                            oninput="filterMaterials(this.value)" />
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="materialsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Quantity</th>
                                <th>Unit</th>
                                <th>Status</th>
                                <th>Category</th>
                                <th>Reported By</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="m: ${materials}">
                                <td th:text="${m.id}" class="text-muted small"></td>
                                <td th:text="${m.name}">Material Name</td>
                                <td th:text="${m.quantity}">0</td>
                                <td th:text="${m.unit ?: 'PCS'}">UNIT</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${m.status.name() == 'OPERATIONAL' ? 'bg-success' : 'bg-warning'}"
                                        th:text="${m.status}">STATUS</span>
                                </td>
                                <td th:text="${m.category}">CATEGORY</td>
                                <td th:text="${m.owner?.fullName ?: '—'}">Owner</td>
                                <td th:text="${#temporals.format(m.createdAt,'dd MMM yyyy')}">Date</td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-outline-primary"><i
                                            class="bi bi-pencil-square"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

    <script>
        function filterMaterials(q) {
            q = q.toLowerCase();
            document.querySelectorAll('#materialsTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
    </script>
</body>

</html>
