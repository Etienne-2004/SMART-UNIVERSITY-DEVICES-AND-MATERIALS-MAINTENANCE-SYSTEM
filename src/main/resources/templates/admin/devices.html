<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Device Management')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('devices')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Device Management')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-laptop-fill text-indigo me-2"></i> Device
                Management</h2>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- All Devices -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">Devices Status</div>
                    <div class="search-input-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control form-control-sm" placeholder="Search devices..."
                            oninput="filterDevices(this.value)" />
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="devicesTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Device ID</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Location</th>
                                <th>Reported At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d: ${devices}">
                                <td th:text="${d.id}" class="text-muted small"></td>
                                <td th:text="${d.deviceName}">Device Name</td>
                                <td th:text="${d.deviceId}">S/N</td>
                                <td th:text="${d.description != null and d.description.length() &gt; 25 ? d.description.substring(0,25) + '...' : d.description ?: '—'}">DESC</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${d.status.name() == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                        th:text="${d.status}">STATUS</span>
                                </td>
                                <td th:text="${d.roomLocation ?: '—'}">Location</td>
                                <td th:text="${#temporals.format(d.createdAt,'dd MMM yyyy')}">Date</td>
                                <td>
                                    <div class="d-flex gap-1">
                                        <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" th:attr="data-bs-target='#editDeviceModal' + ${d.id}" title="Edit">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form th:action="@{'/admin/devices/' + ${d.id} + '/delete'}" method="post" style="display:inline" onsubmit="return confirm('Are you sure you want to delete this device?');">
                                            <button class="btn btn-sm btn-outline-danger" title="Delete">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- Edit Device Modals -->
    <div th:each="d: ${devices}" class="modal fade" th:id="'editDeviceModal' + ${d.id}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{'/admin/devices/' + ${d.id} + '/edit'}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Device</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Device Name</label>
                            <input type="text" name="deviceName" class="form-control" th:value="${d.deviceName}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Device ID</label>
                            <input type="text" name="deviceId" class="form-control" th:value="${d.deviceId}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Room Location</label>
                            <input type="text" name="roomLocation" class="form-control" th:value="${d.roomLocation}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" th:text="${d.description}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select">
                                <option value="ACTIVE" th:selected="${d.status.name() == 'ACTIVE'}">Active</option>
                                <option value="INACTIVE" th:selected="${d.status.name() == 'INACTIVE'}">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

    <script>
        function filterDevices(q) {
            q = q.toLowerCase();
            document.querySelectorAll('#devicesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function deleteDevice(id) {
            if (confirm('Are you sure you want to delete this device?')) {
                window.location.href = '/admin/devices/' + id + '/delete';
            }
        }
    </script>
</body>

</html>
