<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Device Management')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('devices')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Device Management')}"></nav>

        <main class="page-content">
            <h2 class="mb-4 d-flex align-items-center"><i class="bi bi-laptop-fill text-indigo me-2"></i> Device
                Management</h2>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- All Devices -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">Devices Status</div>
                    <div class="search-input-wrap">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control form-control-sm" placeholder="Search devices..."
                            oninput="filterDevices(this.value)" />
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="devicesTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Device ID</th>
                                <th>Description</th>
                                <th>Status</th>
                                <th>Location</th>
                                <th>Reported At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="d: ${devices}">
                                <td th:text="${d.id}" class="text-muted small"></td>
                                <td th:text="${d.deviceName}">Device Name</td>
                                <td th:text="${d.deviceId}">S/N</td>
                                <td th:text="${d.description != null and d.description.length() &gt; 25 ? d.description.substring(0,25) + '...' : d.description ?: '—'}">DESC</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${d.status.name() == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                        th:text="${d.status}">STATUS</span>
                                </td>
                                <td th:text="${d.roomLocation ?: '—'}">Location</td>
                                <td th:text="${#temporals.format(d.createdAt,'dd MMM yyyy')}">Date</td>
                                <td>
                                    <a href="#" class="btn btn-sm btn-outline-primary" title="Details"><i
                                            class="bi bi-eye"></i></a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

    <script>
        function filterDevices(q) {
            q = q.toLowerCase();
            document.querySelectorAll('#devicesTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }
    </script>
</body>

</html>
