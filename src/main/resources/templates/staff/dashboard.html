<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Staff Dashboard')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('dashboard')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Staff Dashboard')}"></nav>

        <main class="page-content">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Welcome Banner -->
            <div class="nation-banner text-emerald">
                <span class="nation-banner-icon">🏛️</span>
                <div>
                    <div class="nation-banner-title"
                        th:text="'Welcome back, ' + ${currentUser?.fullName ?: 'Staff Member'} + '!'">Welcome!</div>
                    <div class="nation-banner-sub" th:text="${currentUser?.university?.name ?: 'University Staff'}">
                        Institute</div>
                </div>
                <div class="ms-auto d-flex gap-2">
                    <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#reportModal">
                        <i class="bi bi-megaphone"></i> Report Issue
                    </button>
                </div>
            </div>

            <!-- KPI -->
            <div class="kpi-grid mb-4">
                <div class="kpi-card c-indigo">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-laptop-fill" style="color:#818cf8"></i></div>
                    </div>
                    <div class="kpi-value count-up" th:text="${myDevices.size()}">0</div>
                    <div class="kpi-label">Registered Devices</div>
                    <div class="kpi-sublabel">Assets assigned to me</div>
                </div>
                <div class="kpi-card c-amber">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-box-fill" style="color:#fbbf24"></i></div>
                    </div>
                    <div class="kpi-value count-up" th:text="${myMaterials.size()}">0</div>
                    <div class="kpi-label">Materials</div>
                    <div class="kpi-sublabel">Learning resources</div>
                </div>
                <div class="kpi-card c-cyan">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-tools" style="color:#22d3ee"></i></div>
                    </div>
                    <div class="kpi-value count-up" th:text="${myRequests.size()}">0</div>
                    <div class="kpi-label">Total Requests</div>
                    <div class="kpi-sublabel">Maintenance history</div>
                </div>
            </div>

            <div class="row g-4">
                <!-- My Devices List -->
                <div class="col-lg-7">
                    <div class="panel">
                        <div class="panel-head">
                            <div class="panel-title">My Registered Devices</div>
                            <a th:href="@{/staff/devices/add}" class="btn btn-sm btn-outline-primary">Add New</a>
                        </div>
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="d: ${myDevices}">
                                        <td th:text="${d.deviceId}" class="fw-700"></td>
                                        <td th:text="${d.deviceName}"></td>
                                        <td th:text="${d.roomLocation}"></td>
                                        <td><span class="badge bg-success">ACTIVE</span></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(myDevices)}">
                                        <td colspan="4" class="text-center p-4">No devices registered.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Recent Activity/Reports -->
                <div class="col-lg-5">
                    <div class="panel">
                        <div class="panel-head">
                            <div class="panel-title">Recent Reports</div>
                        </div>
                        <div id="reportList" class="p-3">
                            <div th:each="r: ${myRequests}" class="mb-3 p-3 border border-subtle rounded bg-glass">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="badge"
                                        th:classappend="${r.priority.name() == 'HIGH' ? 'bg-danger' : 'bg-warning'}"
                                        th:text="${r.priority}">PRIO</span>
                                    <small class="text-muted"
                                        th:text="${#temporals.format(r.reportedAt, 'dd MMM HH:mm')}"></small>
                                </div>
                                <div class="fw-600" th:text="${r.requestType}">TYPE</div>
                                <div class="text-secondary small mb-2"
                                    th:text="${#strings.abbreviate(r.issueDescription, 60)}">Desc</div>
                                <div class="badge bg-secondary" th:text="${r.status}">STATUS</div>
                            </div>
                            <div th:if="${#lists.isEmpty(myRequests)}" class="text-center p-4 text-muted">No reports
                                yet.</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- Report Modal -->
    <div class="modal fade" id="reportModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/staff/maintenance/report}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">New Maintenance Request</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Type</label>
                            <select name="requestType" class="form-select" required onchange="toggleForm(this.value)">
                                <option value="DEVICE">Device Issue</option>
                                <option value="MATERIAL">Material Issue</option>
                            </select>
                        </div>
                        <div class="mb-3" id="deviceSelect">
                            <label class="form-label">Select Device</label>
                            <select name="deviceId" class="form-select">
                                <option th:each="d: ${myDevices}" th:value="${d.id}" th:text="${d.deviceName}"></option>
                            </select>
                        </div>
                        <div class="mb-3 d-none" id="materialSelect">
                            <label class="form-label">Select Material</label>
                            <select name="materialId" class="form-select">
                                <option th:each="m: ${myMaterials}" th:value="${m.id}" th:text="${m.materialName}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM">Medium</option>
                                <option value="HIGH">High</option>
                                <option value="CRITICAL">Critical</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Submit Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script>
        function toggleForm(val) {
            document.getElementById('deviceSelect').classList.toggle('d-none', val !== 'DEVICE');
            document.getElementById('materialSelect').classList.toggle('d-none', val !== 'MATERIAL');
        }
    </script>
</body>

</html>
