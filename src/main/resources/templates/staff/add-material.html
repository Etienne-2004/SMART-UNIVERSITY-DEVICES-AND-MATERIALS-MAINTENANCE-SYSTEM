<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Report Material')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('dashboard')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Report Material Damage')}"></nav>

        <main class="page-content">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/staff/dashboard}" class="btn btn-outline-secondary btn-sm"><i
                        class="bi bi-arrow-left"></i> Back</a>
                <h2 class="mb-0"><i class="bi bi-box-fill me-2 text-amber"></i> Report Material Damage</h2>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="panel mx-auto" style="max-width: 800px">
                <div class="panel-head">
                    <div class="panel-title">Material Details</div>
                </div>
                <div class="p-4">
                    <div class="mb-4 p-3 rounded bg-glass border border-subtle d-flex align-items-center">
                        <i class="bi bi-info-circle-fill text-amber me-3 fs-4"></i>
                        <div>
                            <div class="fw-700 small">Material Tracking</div>
                            <div class="text-secondary smaller">Record the location accurately using campus room codes.
                            </div>
                        </div>
                    </div>

                    <form th:action="@{/staff/materials/add}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Material Name <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="materialName"
                                    placeholder="e.g. Table 01, Mirror 10" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Room / Location <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="roomLocation"
                                    placeholder="e.g. RPKAR/LIB 01/BK ST010" required />
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-600">Issue Description / Condition</label>
                                <textarea class="form-control" name="description" rows="5"
                                    placeholder="Describe the damage or current state of this material..."></textarea>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top d-flex gap-3">
                            <button type="submit" class="btn btn-warning px-4"><i class="bi bi-megaphone me-1"></i>
                                Submit Report</button>
                            <a th:href="@{/staff/dashboard}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>

</html>
