<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Report Damage')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('dashboard')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Report Material Damage')}"></nav>

        <main class="page-content">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/cleaner/dashboard}" class="btn btn-outline-secondary btn-sm"><i
                        class="bi bi-arrow-left"></i> Back</a>
                <h2 class="mb-0 fw-800 text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i> Report Campus
                    Damage</h2>
            </div>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="panel mx-auto" style="max-width: 750px">
                <div class="panel-head">
                    <div class="panel-title">Damage Report Form</div>
                </div>
                <div class="p-4">
                    <div class="mb-4 p-3 rounded bg-glass-danger border border-danger-subtle d-flex align-items-center">
                        <i class="bi bi-shield-exclamation text-danger me-3 fs-4"></i>
                        <div class="small">
                            <div class="fw-700">Urgent Submissions</div>
                            <div class="text-secondary smaller">If this damage poses an immediate safety risk, please
                                also inform campus security.</div>
                        </div>
                    </div>

                    <form th:action="@{/cleaner/report}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-600">Material Name/Type <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-glass" name="materialName"
                                    placeholder="e.g. Chair 04, Mirror 01" required />
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-600">Room / Specific Location <span
                                        class="text-danger">*</span></label>
                                <input type="text" class="form-control bg-glass" name="roomLocation"
                                    placeholder="e.g. RPKAR/MH/CH04" required />
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-600">Describe the Damage <span
                                        class="text-danger">*</span></label>
                                <textarea class="form-control bg-glass" name="description" rows="5" required
                                    placeholder="Describe what is damaged and what happened..."></textarea>
                            </div>
                        </div>
                        <div class="mt-4 pt-3 border-top d-flex gap-3">
                            <button type="submit" class="btn btn-danger px-5 shadow-sm"><i
                                    class="bi bi-send-fill me-2"></i> Submit Report</button>
                            <a th:href="@{/cleaner/dashboard}" class="btn btn-outline-secondary px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <style>
        .bg-glass-danger {
            background: rgba(220, 53, 69, 0.05);
            border: 1px solid rgba(220, 53, 69, 0.1);
        }
    </style>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>

</html>
