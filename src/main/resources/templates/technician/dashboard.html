<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Technician Dashboard')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('dashboard')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Technician Dashboard')}"></nav>

        <main class="page-content">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show mb-4">
                <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
                <button class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Welcome Banner -->
            <div class="nation-banner text-cyan">
                <span class="nation-banner-icon">🔧</span>
                <div>
                    <div class="nation-banner-title"
                        th:text="'Hello, ' + ${currentUser?.fullName ?: 'Technician'} + '!'">Hello!</div>
                    <div class="nation-banner-sub">Technical Operations · Rwanda National University Maintenance System
                    </div>
                </div>
                <div class="ms-auto">
                    <a th:href="@{/technician/tasks}" class="btn btn-sm btn-primary">
                        <i class="bi bi-list-task"></i> View All Tasks
                    </a>
                </div>
            </div>

            <!-- KPI -->
            <div class="kpi-grid mb-4">
                <div class="kpi-card c-amber">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-hourglass-split" style="color:#fbbf24"></i></div>
                        <span class="badge bg-warning text-dark">Assigned</span>
                    </div>
                    <div class="kpi-value count-up" th:text="${pendingCount}">0</div>
                    <div class="kpi-label">Assigned Tasks</div>
                </div>
                <div class="kpi-card c-cyan">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-tools" style="color:#22d3ee"></i></div>
                        <span class="badge bg-info text-dark">Active</span>
                    </div>
                    <div class="kpi-value count-up" th:text="${inProgressCount}">0</div>
                    <div class="kpi-label">In Progress</div>
                </div>
                <div class="kpi-card c-emerald">
                    <div class="kpi-header">
                        <div class="kpi-icon-wrap"><i class="bi bi-check-circle-fill" style="color:#34d399"></i></div>
                        <span class="badge bg-success">Done</span>
                    </div>
                    <div class="kpi-value count-up" th:text="${completedCount}">0</div>
                    <div class="kpi-label">Completed</div>
                </div>
            </div>

            <!-- Task Queue -->
            <div class="panel">
                <div class="panel-head">
                    <div class="panel-title">My Task Queue</div>
                    <a th:href="@{/technician/tasks}" class="panel-link">Full List <i class="bi bi-arrow-right"></i></a>
                </div>
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>#ID</th>
                                <th>Description</th>
                                <th>Priority</th>
                                <th>Due Date</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="task: ${assignedTasks}">
                                <td th:text="'#' + ${task.id}" class="fw-700"></td>
                                <td th:text="${#strings.abbreviate(task.issueDescription, 50)}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${task.priority?.name() == 'HIGH' ? 'bg-danger' : 'bg-warning'}"
                                        th:text="${task.priority}">PRIO</span>
                                </td>
                                <td
                                    th:text="${task.dueDate != null ? #temporals.format(task.dueDate,'dd MMM HH:mm') : '—'}">
                                    Date</td>
                                <td><span class="badge bg-secondary" th:text="${task.status}">STATUS</span></td>
                                <td>
                                    <form th:if="${task.status.name() == 'ASSIGNED'}"
                                        th:action="@{'/technician/tasks/' + ${task.id} + '/start'}" method="post"
                                        style="display:inline">
                                        <button class="btn btn-sm btn-primary">Start</button>
                                    </form>
                                    <button th:if="${task.status.name() == 'IN_PROGRESS'}"
                                        class="btn btn-sm btn-success" data-bs-toggle="modal"
                                        data-bs-target="#completeModal" th:data-task-id="${task.id}">
                                        Complete
                                    </button>
                                    <a th:href="@{'/technician/tasks/' + ${task.id}}"
                                        class="btn btn-sm btn-outline-info">Details</a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(assignedTasks)}">
                                <td colspan="6" class="text-center p-4 text-muted">No active tasks assigned.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- AI CHAT -->
    <div th:replace="~{fragments/layout :: aiChat}"></div>

    <!-- Complete Modal -->
    <div class="modal fade" id="completeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form method="post" id="completeForm">
                    <div class="modal-header">
                        <h5 class="modal-title">Complete Task</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Resolution Notes</label>
                            <textarea name="notes" class="form-control" rows="4" required
                                placeholder="Describe what was done..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Mark Completed</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>
    <script>
        document.getElementById('completeModal')?.addEventListener('show.bs.modal', function (e) {
            const taskId = e.relatedTarget.getAttribute('data-task-id');
            document.getElementById('completeForm').action = '/technician/tasks/' + taskId + '/complete';
        });
    </script>
</body>

</html>
