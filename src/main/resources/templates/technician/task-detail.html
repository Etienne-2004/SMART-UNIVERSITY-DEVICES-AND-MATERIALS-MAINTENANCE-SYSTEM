<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Task Details')}"></head>

<body class="app-body">

    <!-- SIDEBAR -->
    <aside th:replace="~{fragments/layout :: sidebar('tasks')}"></aside>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
        <!-- NAVBAR -->
        <nav th:replace="~{fragments/layout :: navbar('Maintenance Task Detailed View')}"></nav>

        <main class="page-content">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/technician/tasks}" class="btn btn-outline-secondary btn-sm"><i
                        class="bi bi-arrow-left"></i> Back to Tasks</a>
                <h2 class="mb-0">Task #<span th:text="${task.id}"></span></h2>
                <span class="badge ms-2"
                    th:classappend="${task.status.name() == 'COMPLETED' ? 'bg-success' : 'bg-info'}"
                    th:text="${task.status}"></span>
            </div>

            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="panel">
                        <div class="panel-head">
                            <div class="panel-title">Technical Specifications</div>
                        </div>
                        <div class="p-4">
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="text-muted small mb-1">Asset Category</label>
                                    <div class="fw-700" th:text="${task.requestType}">TYPE</div>
                                </div>
                                <div class="col-md-6">
                                    <label class="text-muted small mb-1">Priority Level</label>
                                    <div>
                                        <span class="badge"
                                            th:classappend="${task.priority?.name() == 'HIGH' ? 'bg-danger' : 'bg-warning'}"
                                            th:text="${task.priority}">PRIO</span>
                                    </div>
                                </div>
                                <div class="col-12 py-3 border-top border-bottom border-secondary border-opacity-10">
                                    <label class="text-muted small mb-1">Issue Description</label>
                                    <p class="fs-5 lh-base mb-0" th:text="${task.issueDescription}"></p>
                                </div>
                                <div class="col-md-6" th:if="${task.device != null}">
                                    <label class="text-muted small mb-1">Target Device</label>
                                    <div class="fw-600"><i class="bi bi-laptop me-2"></i><span
                                            th:text="${task.device.deviceName}"></span></div>
                                    <div class="text-secondary smaller"
                                        th:text="'S/N: ' + ${task.device.serialNumber ?: 'N/A'}"></div>
                                </div>
                                <div class="col-md-6" th:if="${task.material != null}">
                                    <label class="text-muted small mb-1">Target Material</label>
                                    <div class="fw-600"><i class="bi bi-box me-2"></i><span
                                            th:text="${task.material.materialName}"></span></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="text-muted small mb-1">Specific Location</label>
                                    <div class="fw-600"><i class="bi bi-geo-alt me-2"></i><span
                                            th:text="${task.device?.roomLocation ?: task.material?.roomLocation ?: 'General Area'}"></span>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="text-muted small mb-1">Reported By</label>
                                    <div class="fw-600 text-indigo" th:text="${task.reportedBy?.fullName ?: 'System'}">
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 pt-3">
                                <!-- Start Button -->
                                <form th:if="${task.status.name() == 'ASSIGNED'}" th:action="@{'/technician/tasks/' + ${task.id} + '/start'}" method="post">
                                    <button class="btn btn-indigo px-5 py-3 rounded-pill shadow-lg">
                                        <i class="bi bi-play-circle-fill me-2"></i> Start Work Order
                                    </button>
                                </form>

                                <!-- Complete Button -->
                                <button th:if="${task.status.name() == 'IN_PROGRESS'}" 
                                        class="btn btn-emerald px-5 py-3 rounded-pill shadow-lg"
                                        data-bs-toggle="modal" data-bs-target="#completeModal">
                                    <i class="bi bi-check-circle-fill me-2"></i> Mark as Completed
                                </button>
                                
                                <div th:if="${task.status.name() == 'COMPLETED'}" class="alert alert-glass-emerald border-emerald border-opacity-25 d-inline-flex align-items-center gap-2 px-4 py-3 rounded-pill">
                                    <i class="bi bi-check-all fs-4 text-emerald"></i>
                                    <span class="fw-600">This task has been resolved and is awaiting admin verification.</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Tech Notes if completed -->
                    <div class="panel mt-4" th:if="${task.technicianNotes}">
                        <div class="panel-head">
                            <div class="panel-title d-flex align-items-center gap-2">
                                <i class="bi bi-clipboard2-check text-emerald"></i> Resolution Report
                            </div>
                        </div>
                        <div class="p-4 rounded bg-glass-indigo border-indigo border-opacity-10">
                            <div class="text-secondary small mb-2 fw-600 uppercase tracking-wider">Technician's Notes:</div>
                            <p class="mb-0 fs-5 lh-base italic" th:text="${task.technicianNotes}"></p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="panel h-100">
                        <div class="panel-head">
                            <div class="panel-title"><i class="bi bi-clock-history me-2 text-indigo"></i> Execution Timeline</div>
                        </div>
                        <div class="p-4">
                            <div class="custom-timeline">
                                <div class="ct-item" th:classappend="${task.reportedAt != null ? 'active' : ''}">
                                    <div class="ct-dot"></div>
                                    <div class="ct-content">
                                        <div class="ct-title">Issue Reported</div>
                                        <div class="ct-time"
                                            th:text="${task.reportedAt != null ? #temporals.format(task.reportedAt,'dd MMM HH:mm') : '—'}">
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-item" th:classappend="${task.assignedAt != null ? 'active' : ''}">
                                    <div class="ct-dot"></div>
                                    <div class="ct-content">
                                        <div class="ct-title">Technician Assigned</div>
                                        <div class="ct-time"
                                            th:text="${task.assignedAt != null ? #temporals.format(task.assignedAt,'dd MMM HH:mm') : 'Pending'}">
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-item" th:classappend="${task.startedAt != null ? 'active' : ''}">
                                    <div class="ct-dot"></div>
                                    <div class="ct-content">
                                        <div class="ct-title">Work Started</div>
                                        <div class="ct-time"
                                            th:text="${task.startedAt != null ? #temporals.format(task.startedAt,'dd MMM HH:mm') : 'Pending'}">
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-item" th:classappend="${task.completedAt != null ? 'active' : ''}">
                                    <div class="ct-dot"></div>
                                    <div class="ct-content">
                                        <div class="ct-title">Resolved</div>
                                        <div class="ct-time"
                                            th:text="${task.completedAt != null ? #temporals.format(task.completedAt,'dd MMM HH:mm') : 'Pending'}">
                                        </div>
                                    </div>
                                </div>
                                <div class="ct-item" th:classappend="${task.verifiedAt != null ? 'active' : ''}">
                                    <div class="ct-dot"></div>
                                    <div class="ct-content">
                                        <div class="ct-title">Admin Verified</div>
                                        <div class="ct-time"
                                            th:text="${task.verifiedAt != null ? #temporals.format(task.verifiedAt,'dd MMM HH:mm') : 'Pending'}">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer th:replace="~{fragments/layout :: footer}"></footer>
    </div>

    <!-- Complete Modal -->
    <div class="modal fade" id="completeModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 overflow-hidden shadow-2xl">
                <form th:action="@{'/technician/tasks/' + ${task.id} + '/complete'}" method="post">
                    <div class="modal-header bg-glass py-4">
                        <div class="d-flex align-items-center">
                            <div class="bg-emerald bg-opacity-10 p-3 rounded-circle me-3">
                                <i class="bi bi-check2-circle text-emerald fs-4"></i>
                            </div>
                            <div>
                                <h5 class="modal-title mb-0">Complete Task #<span th:text="${task.id}"></span></h5>
                                <p class="small text-muted mb-0">Submit resolution findings</p>
                            </div>
                        </div>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label d-flex align-items-center gap-2">
                                <i class="bi bi-pencil-square text-indigo"></i> Technical Resolution Notes
                            </label>
                            <textarea name="notes" class="form-control bg-glass border-0" rows="5" required
                                placeholder="Describe the steps taken to resolve the issue..."></textarea>
                        </div>
                    </div>
                    <div class="modal-footer bg-glass py-3">
                        <button type="button" class="btn btn-link text-secondary text-decoration-none px-4" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-emerald px-5 rounded-pill shadow-lg">
                            <i class="bi bi-send-fill me-2"></i> Submit Report
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <th:block th:replace="~{fragments/layout :: scripts}"></th:block>

    <style>
        .custom-timeline {
            display: flex;
            flex-direction: column;
        }

        .ct-item {
            display: flex;
            gap: 20px;
            border-left: 2px solid rgba(255, 255, 255, 0.05);
            position: relative;
            padding-bottom: 25px;
            padding-left: 20px;
        }

        .ct-item:last-child {
            padding-bottom: 0;
        }

        .ct-dot {
            position: absolute;
            left: -7px;
            top: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #444;
            border: 2px solid #0f1629;
            transition: all 0.3s;
        }

        .ct-item.active {
            border-left-color: #6366f1;
        }

        .ct-item.active .ct-dot {
            background: #6366f1;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .ct-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .ct-time {
            font-size: 11px;
            color: #64748b;
        }

        .bg-glass-indigo {
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid rgba(99, 102, 241, 0.1);
        }
    </style>
</body>

</html>
