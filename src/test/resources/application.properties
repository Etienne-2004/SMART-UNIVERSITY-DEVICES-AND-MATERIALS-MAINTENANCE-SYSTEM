# ─── Test Configuration ──────────────────────────────────────────────────────
# Use H2 in-memory database for tests so no real MySQL connection is needed
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate auto-detect H2 dialect
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable mail auto-configuration for tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ─── JWT Configuration (test values) ─────────────────────────────────────────
app.jwt.secret=TestSecretKeyForJWTSigningPurposesOnlyUsedInTestsNotProduction123456
app.jwt.expiration=86400000

# ─── OTP Configuration (test value) ──────────────────────────────────────────
app.otp.expiry-minutes=1440
